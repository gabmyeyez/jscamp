<!doctype html>
<html lang="es">
  <head>
    <title>DevJobs - Inicio</title>
    <meta charset="UTF-8" />
    <meta
      name="description"
      content="Encuentra las mejores ofertas de trabajo para desarrolladores en DevJobs."
    />

    <link rel="stylesheet" href="./styles.css" />
    <script type="module" src="main.js"></script>
  </head>

  <body>
    <header class="navbar">
      <h1>
        <svg
          fill="none"
          stroke="currentColor"
          stroke-linecap="round"
          stroke-linejoin="round"
          stroke-width="2"
          viewBox="0 0 24 24"
          xmlns="http://www.w3.org/2000/svg"
        >
          <polyline points="16 18 22 12 16 6"></polyline>
          <polyline points="8 6 2 12 8 18"></polyline>
        </svg>
        DevJobs
      </h1>

      <nav>
        <!-- <a href="">
                Inicio
              </a> -->
        <a href="empleos.html">Inicio</a>
        <a href="empleos.html">Empleos</a>
        <a href="empleos.html">Empresas</a>
        <a href="empleos.html">Salarios</a>
      </nav>

      <div class="right-nabvar-parent">
        <a href="">Subir CV</a>
        <!-- <img class="navbar-profile-pic" src="./background.webp" /> -->
        <devjobs-avatar service="github" username="midudev" size="45">
        </devjobs-avatar>
        <!-- <a href="">Iniciar sesión</a> -->
      </div>
    </header>

    <main>
      <section class="main-search-section">
        <h1>Encuentra el trabajo de tus sueños</h1>

        <h2>Explora miles de oportunidades de trabajo en el sector Tech.</h2>

        <form role="search">
          <div>
            <svg
              xmlns="http://www.w3.org/2000/svg"
              width="24"
              height="24"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="1"
              stroke-linecap="round"
              stroke-linejoin="round"
              class="icon icon-tabler icons-tabler-outline icon-tabler-search"
            >
              <path stroke="none" d="M0 0h24v24H0z" fill="none" />
              <path d="M10 10m-7 0a7 7 0 1 0 14 0a7 7 0 1 0 -14 0" />
              <path d="M21 21l-6 -6" />
            </svg>

            <input
              id="empleos-search-input"
              required
              type="text"
              placeholder="Buscar empleos por título, habilidad o empresa"
            />

            <!--<button disabled type="submit">Buscar</button>-->
          </div>
        </form>
      </section>
      <section class="results-section">
        <div class="filters">
          <select class="filter-technology">
            <option value="">Tecnología</option>
            <option value="javascript">Javascipt</option>
            <option value="react">React</option>
            <option value="python">Python</option>
            <option value="mobile">Mobile</option>
            <option value="node">NodeJS</option>
          </select>
          <select class="filter-location">
            <option value="">Ubicación</option>
            <option value="remoto">Remoto</option>
            <optgroup label="Europa">
              <option value="madrid">Madrid</option>
              <option value="valencia">Valencia</option>
              <option value="barcelona">Barcelona</option>
            </optgroup>
            <optgroup label="América">
              <option value="cdmx">Ciudad de México</option>
              <option value="guadalajara">Guadalajara</option>
              <option value="bsas">Buenos Aires</option>
              <option value="bogota">Bogotá</option>
              <option value="lima">Lima</option>
              <option value="santiago">Santiago</option>
              <option value="monterrey">Monterrey</option>
            </optgroup>
          </select>
          <select class="filter-experience">
            <option value="">Nivel de Experiencia</option>
            <option value="junior">Junior</option>
            <option value="mid-level">Mid</option>
            <option value="senior">Senior</option>
          </select>
        </div>
        <header>
          <h2>Resultados de Búsqueda</h2>
        </header>
        <div class="results-container"></div>
        <nav class="pagination">
          <a href="#"
            ><svg
              xmlns="http://www.w3.org/2000/svg"
              width="24"
              height="24"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
              class="icon icon-tabler icons-tabler-outline icon-tabler-chevron-left"
            >
              <path stroke="none" d="M0 0h24v24H0z" fill="none" />
              <path d="M15 6l-6 6l6 6" /></svg
          ></a>
          <a class="is-active" href="#">1</a>
          <a href="#">2</a>
          <a href="#">3</a>
          <a href="#">4</a>
          <a href="#">5</a>
          <a href="#"
            ><svg
              xmlns="http://www.w3.org/2000/svg"
              width="24"
              height="24"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
              class="icon icon-tabler icons-tabler-outline icon-tabler-chevron-right"
            >
              <path stroke="none" d="M0 0h24v24H0z" fill="none" />
              <path d="M9 6l6 6l-6 6" /></svg
          ></a>
        </nav>
      </section>
    </main>

    <footer class="main-footer">
      <small>&copy; 2025 DevJobs. Todos los derechos reservados.</small>
    </footer>
  </body>
</html>
